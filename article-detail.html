  <script src="script.js"></script>
  <script>
    (function() {
      var container = document.getElementById('fireflies');
      if (!container) return;
      var html = '';
      for (var i = 0; i < 25; i++) {
        html += '<div class="firefly" style="left:' + (Math.random()*95).toFixed(1) + '%;top:' +
          (Math.random()*90).toFixed(1) + '%;--dur:' + (2+Math.random()*5).toFixed(1) +
          's;--delay:' + (Math.random()*6).toFixed(1) + 's;"></div>';
      }
      container.innerHTML = html;
    })();
